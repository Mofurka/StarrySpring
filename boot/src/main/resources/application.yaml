spring:
  application:
    name: irden-proxy
  datasource:
    url: jdbc:postgresql://localhost:5432/starryspring
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true


proxy:
  listen-host: 0.0.0.0
  listen-port: 7777
  upstream-host: irden.space
  upstream-port: 21024

assets:
  store:
    enabled: false
    archives: []
    excluded-extensions:
      - .ogg
      - .png
      - .wav

logging:
  level:
    root: INFO
    irden.space.proxy.application: INFO
