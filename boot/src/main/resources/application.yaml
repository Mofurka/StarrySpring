spring:
  application:
    name: irden-proxy
  datasource:
    url: jdbc:postgresql://localhost:15432/starryspring
    username: postgres
    password: postgres
  liquibase:
    enabled: false



proxy:
  listen-host: 0.0.0.0
  listen-port: 7777
  upstream-host: irden.space
  upstream-port: 21024

assets:
  store:
    enabled: false
    archives: []
    excluded-extensions:
      - .ogg
      - .png
      - .wav

logging:
  level:
    root: INFO
    irden.space.proxy.application: INFO
